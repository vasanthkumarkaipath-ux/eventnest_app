{% extends 'base.html' %}
{% block content %}
<div class="glass">
<h2>{{ role }} Login</h2>

<form method="POST">
<input name="username" placeholder="Username">
<input type="password" name="password" placeholder="Password">
<button>Login</button>
</form>

{% if role == "user" %}
<p><a href="/signup">Signup</a></p>
{% endif %}

</div>
{% endblock %}
