{% extends 'base.html' %}

{% block content %}
<div class="glass">
    <h2>Participants</h2>

    <table>
        <tr>
            <th>Name</th>
            <th>Event</th>
        </tr>

        {% for row in data %}
        <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
        </tr>
        {% endfor %}
    </table>
</div>
{% endblock %}
